name: CI

permissions: {}

on:
  pull_request:
  push:
    branches:
      - main
      - dev
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  codegen:
    needs: tidy
    uses: taiki-e/github-actions/.github/workflows/gen.yml@a57add62f2464b6791c594783f513e5194350ac9 # main
    permissions:
      contents: write # for creating branch for pr
      pull-requests: write # unused (used in `automerge: true` case)
    secrets:
      PR_TOKEN_APP_PRIVATE_KEY: ${{ secrets.PR_TOKEN_APP_PRIVATE_KEY }}
  miri:
    needs: tidy
    uses: taiki-e/github-actions/.github/workflows/miri.yml@a57add62f2464b6791c594783f513e5194350ac9 # main
    with:
      # NB: sync with test job's --exclude option
      args: --exclude assert-unmoved-internal-codegen
  msrv:
    needs: tidy
    uses: taiki-e/github-actions/.github/workflows/msrv.yml@a57add62f2464b6791c594783f513e5194350ac9 # main
    with:
      all-features: false
  test:
    needs: tidy
    uses: taiki-e/github-actions/.github/workflows/test.yml@a57add62f2464b6791c594783f513e5194350ac9 # main
    with:
      # NB: sync with miri job's --exclude option
      test-args: --exclude assert-unmoved-internal-codegen
      no-std: false
      optional-deps: ''
  tidy:
    uses: taiki-e/github-actions/.github/workflows/tidy.yml@a57add62f2464b6791c594783f513e5194350ac9 # main
    permissions:
      security-events: write # for github/codeql-action/*
