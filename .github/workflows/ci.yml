name: CI

permissions: {}

on:
  pull_request:
  push:
    branches:
      - main
      - dev
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  tidy:
    uses: taiki-e/github-actions/.github/workflows/tidy.yml@e6a1170cbd07eb898017958967912976fce18f2d # 2026.7.3
    permissions:
      security-events: write # for github/codeql-action/*
    with:
      implicit_provenance_casts: false # we cast ptr to int to move check (addr requires Rust 1.84)
  test:
    needs: tidy
    uses: taiki-e/github-actions/.github/workflows/rust-test.yml@e6a1170cbd07eb898017958967912976fce18f2d # 2026.7.3
    with:
      test-args: --exclude assert-unmoved-internal-codegen
      no-std: false
      optional-deps: ''
      msrv-all-features: false
